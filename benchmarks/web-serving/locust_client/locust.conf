[core]
# Locust Configuration File
# This file contains common settings for the Elgg benchmark load test

# Base URL for the target application
# host = http://localhost:8080

# Number of concurrent users to simulate
# users = 50

# Rate at which to spawn new users (users per second)
# spawn-rate = 5

# Duration of the test (e.g., 1m, 1h, 1d)
# run-time = 5m

# Log level (debug, info, warning, error, critical)
loglevel = info

# Logging file
# logfile = locust.log

[web]
# Web UI host and port
# web-host = 0.0.0.0
# web-port = 8089

# Enable web UI
# web-ui = true

# WebUI authentication (when running distributed)
# web-auth = username:password

[locust]
# Accept self-signed certificates
# insecure = true

[environment]
# Number of seconds to wait between request
# This is handled in the HttpUser class with wait_time

# Reset statistics at this time (format HH:MM:SS or use "none")
# reset-stats = none

# Keep CSV statistics
# csv = results

# CSVs file name prefix
# csv-prefix = benchmark

# Stop timeout in seconds
stop-timeout = 120

[distributed]
# Master bind host (for master node)
# master-bind-host = 0.0.0.0

# Master bind port (for master node)
# master-bind-port = 5557

# Master host (for worker nodes)
# master-host = localhost

# Master port (for worker nodes)
# master-port = 5557

# Worker log level
# worker-loglevel = info

# Number of worker processes
# processes = -1  # Use all available CPU cores
